name = "orquestra"
account_id = "568525424c1d0ac88c8baa71f52d3e45"
workers_dev = true
main = "packages/worker/src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Development Variables (used by `wrangler dev` without --env flag)
[vars]
ENVIRONMENT = "development"
GITHUB_OAUTH_ID = "Ov23liMCsCr6TDxJdNy5"

JWT_EXPIRY = "30d"
FRONTEND_URL = "http://localhost:5173"
API_BASE_URL = "http://localhost:8787"
CORS_ORIGIN = "http://localhost:5173"

# Routes for production
[route]
pattern = "api.orquestra.dev/*"
zone_name = "orquestra.dev"

# Top-level D1 Databases (used by wrangler CLI commands)
[[d1_databases]]
binding = "DB"
database_name = "orquestra-prod"
database_id = "7308ceeb-9f86-4948-a1bf-916d21078788"

# Top-level KV Namespaces (used by wrangler CLI commands)
[[kv_namespaces]]
binding = "IDLS"
id = "f9bd92f54c1149fba41a7c6c3ef20760"

[[kv_namespaces]]
binding = "CACHE"
id = "00550acbdd544169b8af0e5eb7a34bdd"

[ai]
binding = "AI"

# Environment: Production
[env.production]
name = "orquestra-worker-prod"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "api.orquestra.dev/*", zone_name = "orquestra.dev" }
]

[[env.production.d1_databases]]
binding = "DB"
database_name = "orquestra-prod"
database_id = "7308ceeb-9f86-4948-a1bf-916d21078788"

[[env.production.kv_namespaces]]
binding = "IDLS"
id = "f9bd92f54c1149fba41a7c6c3ef20760"

[[env.production.kv_namespaces]]
binding = "CACHE"
id = "00550acbdd544169b8af0e5eb7a34bdd"

[env.production.ai]
binding = "AI"

# Environment: Development
[env.development]
name = "orquestra-worker-dev"
workers_dev = true
compatibility_flags = ["nodejs_compat"]

[[env.development.d1_databases]]
binding = "DB"
database_name = "orquestra-dev"
database_id = "38a17d10-e419-44f9-834c-1cbf64d81d66"

[[env.development.kv_namespaces]]
binding = "IDLS"
id = "ab1db1fef1094ee89aa4b7876c1b7d38"

[[env.development.kv_namespaces]]
binding = "CACHE"
id = "5868c26cb04949fd88ff75c0d315d475"

[env.development.ai]
binding = "AI"

# Environment Variables - Production
[env.production.vars]
ENVIRONMENT = "production"
GITHUB_OAUTH_ID = "Ov23liMCsCr6TDxJdNy5"

JWT_EXPIRY = "7d"
FRONTEND_URL = "https://orquestra.dev"
API_BASE_URL = "https://api.orquestra.dev"
CORS_ORIGIN = "https://orquestra.dev"

# Environment Variables - Development
[env.development.vars]
ENVIRONMENT = "development"
GITHUB_OAUTH_ID = "Ov23liMCsCr6TDxJdNy5"

JWT_EXPIRY = "30d"
FRONTEND_URL = "http://localhost:5173"
API_BASE_URL = "http://localhost:8787"
CORS_ORIGIN = "http://localhost:5173"

# Secrets (set via: wrangler secret put <NAME>)
# Required secrets for production:
#   JWT_SECRET          — JWT signing secret
#   GITHUB_OAUTH_SECRET — GitHub OAuth app secret
#   INGEST_API_KEY      — Service key for CLI bulk IDL ingest (X-Ingest-Key header)
#
# Set with: wrangler secret put INGEST_API_KEY --env production

# Observability
[observability]
enabled = false
